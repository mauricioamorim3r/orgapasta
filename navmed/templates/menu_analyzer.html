<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NavMed — Analisador de Cardápios</title>
  <style>
    /* ── Design Tokens (espelho de style.css) ─────────────────────────── */
    :root {
      --bg-deep:   #0f1117;
      --bg-card:   #1a2035;
      --bg-hover:  #1e2944;
      --border:    #334155;
      --accent:    #3b82f6;
      --success:   #22c55e;
      --warning:   #eab308;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --font-mono: 'Courier New', Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    #page-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
      text-decoration: none;
    }

    .header-logo:hover { opacity: 0.8; }

    .header-sep { color: var(--border); }

    .header-title {
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 3px;
    }

    .tab-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: var(--bg-card);
      color: var(--text);
    }

    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Main content ────────────────────────────────────────────────── */
    #main-content { max-width: 860px; margin: 32px auto; padding: 0 20px 40px; }

    /* ── Upload Zone ─────────────────────────────────────────────────── */
    #dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-card);
      margin-bottom: 20px;
    }

    #dropzone:hover, #dropzone.drag-over {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .dropzone-icon { font-size: 48px; margin-bottom: 12px; }

    .dropzone-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .dropzone-sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

    /* ── Thumbnail strip ─────────────────────────────────────────────── */
    #thumbnail-strip {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .thumb-card {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .thumb-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Form ────────────────────────────────────────────────────────── */
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .form-group input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] { accent-color: var(--accent); }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-hover); }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }

    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* ── Processing ──────────────────────────────────────────────────── */
    #state-processing {
      text-align: center;
      padding: 80px 24px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #processing-status {
      color: var(--muted);
      font-size: 15px;
      margin-top: 8px;
    }

    /* ── Results ─────────────────────────────────────────────────────── */
    #results-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .results-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .section-header:hover { background: var(--bg-hover); }

    .section-title {
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-chevron {
      color: var(--muted);
      transition: transform 0.2s;
      font-size: 12px;
    }

    .section-chevron.open { transform: rotate(180deg); }

    .section-body { padding: 16px; border-top: 1px solid var(--border); }

    /* ── Summary bar ─────────────────────────────────────────────────── */
    .summary-chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .chip-price { background: #1e3a5f; color: #93c5fd; }
    .chip-vegan { background: #064e3b; color: #6ee7b7; }
    .chip-veg   { background: #14532d; color: #86efac; }
    .chip-gluten  { background: #7f1d1d; color: #fca5a5; }
    .chip-lactose { background: #78350f; color: #fde68a; }
    .chip-nuts    { background: #431407; color: #fdba74; }
    .chip-eggs    { background: #3b3000; color: #fef08a; }
    .chip-shellfish { background: #1c3352; color: #7dd3fc; }
    .chip-soy     { background: #2d1b69; color: #c4b5fd; }

    /* ── Highlights ──────────────────────────────────────────────────── */
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .highlight-card {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      transition: border-color 0.15s;
    }

    .highlight-card:hover { border-color: var(--accent); }

    .highlight-icon { font-size: 24px; }
    .highlight-label { color: var(--muted); font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .highlight-name { color: var(--text); font-weight: 600; margin-top: 4px; font-size: 13px; }
    .highlight-price { color: var(--success); font-size: 12px; margin-top: 2px; }

    /* ── Price Intelligence ──────────────────────────────────────────── */
    .price-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .price-stat {
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .price-stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .price-stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .price-min-val  { color: var(--success); }
    .price-avg-val  { color: var(--accent); }
    .price-max-val  { color: var(--danger); }

    /* ── Category accordion ──────────────────────────────────────────── */
    .category-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .category-header {
      padding: 12px 14px;
      background: var(--bg-deep);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 600;
    }

    .category-header:hover { background: var(--bg-hover); }

    .category-count {
      background: var(--bg-card);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .category-items { padding: 0; }

    .dish-row {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .dish-row:hover { background: var(--bg-hover); }

    .dish-info { flex: 1; }
    .dish-name { font-weight: 600; font-size: 14px; }
    .dish-desc { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.4; }

    .dish-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .dish-tag {
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
    }

    .tag-allergen { background: #7f1d1d; color: #fca5a5; }
    .tag-vegan    { background: #064e3b; color: #6ee7b7; }
    .tag-vegetarian { background: #14532d; color: #86efac; }
    .tag-badge    { background: #1e3a5f; color: #93c5fd; }

    .dish-right { text-align: right; min-width: 90px; }
    .dish-price { color: var(--success); font-weight: 700; font-size: 15px; }
    .dish-cal   { color: var(--muted); font-size: 11px; margin-top: 3px; }

    .value-stars { color: var(--warning); font-size: 11px; margin-top: 3px; }

    /* ── Allergen Map ────────────────────────────────────────────────── */
    .allergen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .allergen-card {
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .allergen-icon { font-size: 22px; }
    .allergen-name { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .allergen-count { font-size: 18px; font-weight: 700; color: var(--warning); }

    /* ── Raw Analysis ────────────────────────────────────────────────── */
    .raw-analysis-text {
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }

    /* ── History ─────────────────────────────────────────────────────── */
    #history-search {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      width: 100%;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }

    #history-search:focus { border-color: var(--accent); }

    .history-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color 0.15s;
    }

    .history-card:hover { border-color: var(--accent); }

    .history-icon {
      font-size: 28px;
      background: var(--bg-deep);
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .history-info { flex: 1; }
    .history-name { font-weight: 700; font-size: 15px; }
    .history-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .history-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

    .history-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

    /* ── Compare ─────────────────────────────────────────────────────── */
    #compare-view { display: none; }

    .compare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: start;
    }

    .compare-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .compare-col-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .compare-diff {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      padding-top: 32px;
    }

    .diff-item {
      text-align: center;
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 80px;
    }

    .diff-label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
    .diff-val { font-weight: 700; font-size: 16px; margin-top: 2px; }
    .diff-positive { color: var(--success); }
    .diff-negative { color: var(--danger); }
    .diff-neutral { color: var(--muted); }

    .compare-stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .compare-stat:last-child { border-bottom: none; }
    .compare-stat-label { color: var(--muted); }

    /* ── Compare select mode ─────────────────────────────────────────── */
    .compare-selecting .history-card {
      cursor: pointer;
    }

    .compare-selecting .history-card:hover {
      border-color: var(--warning);
    }

    .compare-selected-a { border-color: var(--accent) !important; }

    .compare-banner {
      background: #78350f;
      color: #fde68a;
      border: 1px solid var(--warning);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    /* ── Empty states ────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      max-width: 320px;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .toast-success { border-left: 3px solid var(--success); }
    .toast-error   { border-left: 3px solid var(--danger); }
    .toast-info    { border-left: 3px solid var(--accent); }

    /* ── Provider Selector ───────────────────────────────────────────── */
    .provider-section-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .provider-label {
      cursor: pointer;
      display: block;
    }

    .provider-label input[type="radio"] { display: none; }

    .provider-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      transition: all 0.15s;
      position: relative;
      user-select: none;
    }

    .provider-label:hover .provider-card { border-color: var(--muted); }

    .provider-label input:checked + .provider-card {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .provider-icon { font-size: 22px; line-height: 1; }

    .provider-name {
      font-weight: 700;
      font-size: 13px;
      margin-top: 7px;
      color: var(--text);
    }

    .provider-model {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .badge-free {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #14532d;
      color: #86efac;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }

    .badge-model-used {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .price-grid { grid-template-columns: repeat(3, 1fr); }
      .compare-grid { grid-template-columns: 1fr; }
      .compare-diff { flex-direction: row; flex-wrap: wrap; justify-content: center; padding-top: 0; }
      .form-row { flex-direction: column; }
      #page-header { flex-wrap: wrap; }
      .provider-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
  <div id="page-header">
    <a href="/" class="header-logo">NavMed</a>
    <span class="header-sep">›</span>
    <span class="header-title">📷 Analisador de Cardápios</span>
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="analyze" onclick="switchTab('analyze')">Analisar</button>
      <button class="tab-btn" data-tab="history" onclick="switchTab('history')">Histórico</button>
    </div>
  </div>

  <!-- ── MAIN CONTENT ───────────────────────────────────────────────────────── -->
  <div id="main-content">

    <!-- ── TAB: ANALYZE ────────────────────────────────────────────────────── -->
    <div id="tab-analyze">

      <!-- STATE: Upload -->
      <div id="state-upload">
        <input type="file" id="file-input" multiple accept="image/*" style="display:none">

        <div id="dropzone" onclick="document.getElementById('file-input').click()">
          <div class="dropzone-icon">🍽️</div>
          <div class="dropzone-title">Arraste as fotos do cardápio aqui</div>
          <div class="dropzone-sub">ou clique para selecionar · JPEG, PNG, WebP · Até 5 fotos · Máx 5 MB cada</div>
          <button class="btn btn-secondary" onclick="event.stopPropagation();document.getElementById('file-input').click()">
            Selecionar Fotos
          </button>
        </div>

        <div id="thumbnail-strip"></div>

        <div class="form-row">
          <div class="form-group">
            <label>Nome do Restaurante (opcional)</label>
            <input type="text" id="restaurant-name" placeholder="Ex: La Trattoria, Boteco do João...">
          </div>
          <div class="form-group">
            <label>Localização / Observações (opcional)</label>
            <input type="text" id="location-notes" placeholder="Ex: Rua das Flores, 42 — Shopping Center">
          </div>
        </div>

        <!-- ── Seletor de provedor de IA ──────────────────────────────── -->
        <div style="margin-bottom:20px">
          <div class="provider-section-label">Modelo de IA para análise</div>
          <div class="provider-grid">

            <label class="provider-label">
              <input type="radio" name="provider" value="claude" checked>
              <div class="provider-card">
                <div class="provider-icon">🟣</div>
                <div class="provider-name">Claude Sonnet</div>
                <div class="provider-model">Anthropic · claude-sonnet-4-6</div>
              </div>
            </label>

            <label class="provider-label">
              <input type="radio" name="provider" value="openai">
              <div class="provider-card">
                <div class="provider-icon">🟢</div>
                <div class="provider-name">GPT-4o</div>
                <div class="provider-model">OpenAI · gpt-4o</div>
              </div>
            </label>

            <label class="provider-label">
              <input type="radio" name="provider" value="gemini">
              <div class="provider-card">
                <div class="provider-icon">🔵</div>
                <div class="provider-name">Gemini 2.0 Flash</div>
                <div class="provider-model">Google · gemini-2.0-flash</div>
              </div>
            </label>

            <label class="provider-label">
              <input type="radio" name="provider" value="groq">
              <div class="provider-card">
                <span class="badge-free">GRATUITO</span>
                <div class="provider-icon">⚡</div>
                <div class="provider-name">Llama 4 Scout</div>
                <div class="provider-model">Groq · llama-4-scout</div>
              </div>
            </label>

          </div>
        </div>

        <div class="form-footer">
          <label class="checkbox-label">
            <input type="checkbox" id="save-to-history" checked>
            Salvar no histórico
          </label>
          <button class="btn btn-primary" id="btn-analyze" disabled onclick="submitAnalysis()">
            🔍 Analisar Cardápio
          </button>
        </div>
      </div>

      <!-- STATE: Processing -->
      <div id="state-processing" style="display:none">
        <div class="spinner"></div>
        <div style="font-size:24px;margin-bottom:8px">🍽️</div>
        <div style="font-size:17px;font-weight:600;color:var(--text)">Analisando cardápio...</div>
        <div id="processing-status">Enviando fotos...</div>
        <div id="processing-model" style="color:var(--muted);font-size:12px;margin-top:12px"></div>
      </div>

      <!-- STATE: Results -->
      <div id="state-results" style="display:none">
        <div id="results-actions">
          <button class="btn btn-secondary" onclick="resetToUpload()">← Nova Análise</button>
          <button class="btn btn-secondary" id="btn-export" onclick="exportCurrentMenu()">⬇ Exportar Cardápio</button>
          <button class="btn btn-secondary" onclick="switchTab('history')">📋 Ver Histórico</button>
        </div>

        <div id="results-summary-bar"></div>
        <div id="results-highlights"></div>
        <div id="results-price-intel"></div>
        <div id="results-categories"></div>
        <div id="results-allergen-map"></div>
        <div id="results-raw-analysis"></div>
      </div>

    </div><!-- /tab-analyze -->

    <!-- ── TAB: HISTORY ─────────────────────────────────────────────────────── -->
    <div id="tab-history" style="display:none">

      <div class="compare-banner" id="compare-banner" style="display:none">
        <span id="compare-banner-text">Selecione o primeiro cardápio para comparar</span>
        <button class="btn btn-sm btn-secondary" onclick="cancelCompare()">Cancelar</button>
      </div>

      <input type="text" id="history-search" placeholder="🔍 Buscar restaurante...">

      <div id="history-list"></div>

      <!-- Compare View (dentro da aba histórico) -->
      <div id="compare-view">
        <div class="compare-header">
          <h2 style="font-size:16px">Comparação de Cardápios</h2>
          <button class="btn btn-secondary btn-sm" onclick="closeCompareView()">✕ Fechar</button>
        </div>
        <div class="compare-grid" id="compare-grid"></div>
      </div>

    </div><!-- /tab-history -->

  </div>

  <!-- ── TOAST CONTAINER ────────────────────────────────────────────────────── -->
  <div id="toast-container"></div>

  <script src="/static/menu_analyzer.js"></script>
</body>
</html>
